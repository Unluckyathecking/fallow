[project]
name = "fallow-coordinator"
version = "0.1.0"
description = "Fallow coordinator: registry, auth, job queue, scheduler, model distribution, OpenAI-compatible gateway."
requires-python = ">=3.12"
dependencies = [
    "fallow-protocol",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "httpx>=0.27",
    "aiosqlite>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_coordinator"]

[tool.uv.sources]
fallow-protocol = { workspace = true }
