name: Go conformance

on:
  push:
    branches: [main]
    paths:
      - "go-agent/**"
      - "schemas/**"
      - "packages/fallow-coordinator/**"
      - "tests/integration/**"
      - "pyproject.toml"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go-agent/**"
      - "schemas/**"
      - "packages/fallow-coordinator/**"
      - "tests/integration/**"
      - "pyproject.toml"
      - ".github/workflows/go.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Generated types and fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go-agent/go.mod
          cache: false

      - name: Check generated wire types
        run: python3 schemas/generate_go.py --check

      - name: Check Go formatting
        shell: bash
        run: test -z "$(gofmt -l go-agent)"

      - name: Run Go tests
        working-directory: go-agent
        run: go test ./...

  parity:
    name: Agent parity (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go-agent/go.mod
          cache: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync locked workspace
        run: uv sync --frozen --dev

      - name: Build the Go agent
        shell: bash
        run: |
          BIN="$RUNNER_TEMP/agentctl"
          if [ "$RUNNER_OS" = "Windows" ]; then BIN="$BIN.exe"; fi
          go build -C go-agent -o "$BIN" ./cmd/agentctl
          echo "FALLOW_GO_AGENT_BIN=$BIN" >> "$GITHUB_ENV"

      - name: Run the parity scenarios against the Go agent
        run: uv run pytest -m goagent
