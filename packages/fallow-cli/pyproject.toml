[project]
name = "fallow-cli"
version = "0.1.0"
description = "flw — the Fallow command-line interface: enroll, models, jobs, status, bench."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
keywords = ["ai", "cli", "distributed-computing", "inference"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Console",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "fallow-protocol",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/Unluckyathecking/fallow"
Documentation = "https://github.com/Unluckyathecking/fallow#readme"
Issues = "https://github.com/Unluckyathecking/fallow/issues"
Source = "https://github.com/Unluckyathecking/fallow"

[project.scripts]
flw = "fallow_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_cli"]

[tool.hatch.build.targets.sdist.force-include]
"../../LICENSE" = "LICENSE"

[tool.uv.sources]
fallow-protocol = { workspace = true }
