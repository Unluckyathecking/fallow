# Example Fallow coordinator config (module I1).
#
# Copy to ~/.fallow/coordinator.toml and edit. Every key maps to a field on
# fallow_coordinator.app.CoordinatorConfig and can be overridden at runtime by an
# environment variable named FALLOW_COORD_<FIELD> (e.g. FALLOW_COORD_ADMIN_KEY),
# which wins over the value here. Paths are absolute on the coordinator host.

# ── Storage (one SQLite file is shared by the registry and the queue) ─────────
db_path = "/var/lib/fallow/coordinator.db"
blob_dir = "/var/lib/fallow/blobs"          # registered model gguf blobs
unit_input_dir = "/var/lib/fallow/units"    # content-addressed work-unit inputs
result_dir = "/var/lib/fallow/results"      # content-addressed work-unit results
events_jsonl_path = "/var/lib/fallow/events.jsonl"
gateway_log_path = "/var/lib/fallow/gateway.jsonl"

# ── Secrets + networking ──────────────────────────────────────────────────────
# The bootstrap admin key. Prefer FALLOW_COORD_ADMIN_KEY in production so the
# secret is not committed to disk in cleartext.
admin_key = "change-me-to-a-long-random-string"
# Bind to the machine's tailnet interface in production (ADR 000 §6), not 0.0.0.0.
host = "127.0.0.1"
port = 8330

# ── Liveness thresholds (seconds) ─────────────────────────────────────────────
suspect_after_s = 15.0   # heartbeat older than this → suspect (not routable)
offline_after_s = 45.0   # heartbeat older than this → offline (leases requeued)

# ── Background maintenance + long-poll tuning ─────────────────────────────────
requeue_interval_s = 10.0  # cadence of the expired-lease sweep + offline eviction
quota_snapshot_interval_s = 30.0  # persist in-memory key counters on this cadence
long_poll_max_s = 25.0     # server-side cap on the agent work long-poll timeout
poll_sleep_s = 0.5         # inter-attempt sleep inside a work long-poll

# ── Job chunking ──────────────────────────────────────────────────────────────
chunks_per_unit = 32       # embed chunks grouped into one work unit
max_result_payload_bytes = 67108864  # reject result uploads larger than 64 MiB
