name: Feature request
description: Propose an improvement aligned with Fallow's scope
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should Fallow solve, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe behaviour, alternatives and important trade-offs.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and risk
      description: Consider protocols, platforms, privacy, security, model licensing and operational failure modes.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This proposal does not enable grading, admissions, profiling, biometric processing or another high-risk decision use.
          required: true
        - label: I searched existing issues and the roadmap.
          required: true
