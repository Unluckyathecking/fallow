[project]
name = "fallow-agent"
version = "0.1.0"
description = "Fallow per-machine agent: idle detection, instant preemption, inference-process supervision, batch workers."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
keywords = ["ai", "distributed-computing", "inference", "llama-cpp"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "fallow-protocol",
    "httpx>=0.27",
    "psutil>=6.0",
    "nvidia-ml-py>=12.0",
    "pyobjc-framework-Quartz>=10.3; sys_platform == 'darwin'",
]

[project.urls]
Homepage = "https://github.com/Unluckyathecking/fallow"
Documentation = "https://github.com/Unluckyathecking/fallow#readme"
Issues = "https://github.com/Unluckyathecking/fallow/issues"
Source = "https://github.com/Unluckyathecking/fallow"

[project.optional-dependencies]
whisper = ["faster-whisper>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_agent"]

[tool.hatch.build.targets.sdist.force-include]
"../../LICENSE" = "LICENSE"

[tool.uv.sources]
fallow-protocol = { workspace = true }
