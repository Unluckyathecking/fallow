[project]
name = "fallow-bench"
version = "0.1.0"
description = "Fallow experiment harness: workload generator, churn injector, metrics analysis."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
keywords = ["ai", "benchmark", "distributed-computing", "inference"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "fallow-coordinator",
    "fallow-protocol",
    "httpx>=0.27",
    "numpy>=2.0",
    "pandas>=2.2",
    "matplotlib>=3.9",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/Unluckyathecking/fallow"
Documentation = "https://github.com/Unluckyathecking/fallow#readme"
Issues = "https://github.com/Unluckyathecking/fallow/issues"
Source = "https://github.com/Unluckyathecking/fallow"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_bench"]

[tool.hatch.build.targets.sdist.force-include]
"../../LICENSE" = "LICENSE"

[tool.uv.sources]
fallow-coordinator = { workspace = true }
fallow-protocol = { workspace = true }
