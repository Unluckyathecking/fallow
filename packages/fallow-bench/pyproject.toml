[project]
name = "fallow-bench"
version = "0.1.0"
description = "Fallow experiment harness: workload generator, churn injector, metrics analysis."
requires-python = ">=3.12"
dependencies = [
    "fallow-protocol",
    "httpx>=0.27",
    "numpy>=2.0",
    "pandas>=2.2",
    "matplotlib>=3.9",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_bench"]

[tool.uv.sources]
fallow-protocol = { workspace = true }
