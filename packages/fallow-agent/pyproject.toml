[project]
name = "fallow-agent"
version = "0.1.0"
description = "Fallow per-machine agent: idle detection, instant preemption, inference-process supervision, batch workers."
requires-python = ">=3.12"
dependencies = [
    "fallow-protocol",
    "httpx>=0.27",
    "psutil>=6.0",
    "nvidia-ml-py>=12.0",
    "pyobjc-framework-Quartz>=10.3; sys_platform == 'darwin'",
]

[project.optional-dependencies]
whisper = ["faster-whisper>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_agent"]

[tool.uv.sources]
fallow-protocol = { workspace = true }
