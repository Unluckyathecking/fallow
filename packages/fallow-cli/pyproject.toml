[project]
name = "fallow-cli"
version = "0.1.0"
description = "flw — the Fallow command-line interface: enroll, models, jobs, status, bench."
requires-python = ">=3.12"
dependencies = [
    "fallow-protocol",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
]

[project.scripts]
flw = "fallow_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_cli"]

[tool.uv.sources]
fallow-protocol = { workspace = true }
