[project]
name = "fallow-protocol"
version = "0.1.0"
description = "Fallow wire types and interface contracts. Depends on pydantic + stdlib only."
readme = "README.md"
license = "AGPL-3.0-or-later"
license-files = ["LICENSE"]
requires-python = ">=3.12"
keywords = ["ai", "distributed-computing", "protocol", "pydantic"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["pydantic>=2.8"]

[project.urls]
Homepage = "https://github.com/Unluckyathecking/fallow"
Documentation = "https://github.com/Unluckyathecking/fallow#readme"
Issues = "https://github.com/Unluckyathecking/fallow/issues"
Source = "https://github.com/Unluckyathecking/fallow"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fallow_protocol"]

[tool.hatch.build.targets.sdist.force-include]
"../../LICENSE" = "LICENSE"
