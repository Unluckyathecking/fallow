name: Go conformance

on:
  push:
    branches: [main]
    paths:
      - "go-agent/**"
      - "schemas/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go-agent/**"
      - "schemas/**"
      - ".github/workflows/go.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Core agent (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go-agent/go.mod
          cache: false

      - name: Check generated wire types
        if: runner.os == 'Linux'
        run: python3 schemas/generate_go.py --check

      - name: Check Go formatting
        if: runner.os == 'Linux'
        shell: bash
        run: test -z "$(gofmt -l go-agent)"

      - name: Run Go tests
        working-directory: go-agent
        run: go test ./...

      - name: Run Go vet
        working-directory: go-agent
        run: go vet ./...
